<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay Bốc Thăm May Mắn</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .box-container {
            margin: 30px 0;
            position: relative;
        }

        /* Hiệu ứng hộp bốc thăm */
        .lucky-box {
            width: 120px;
            height: 120px;
            background: #ff4757;
            margin: 0 auto;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        .lucky-box:hover {
            transform: scale(1.05);
        }

        /* Hiệu ứng lắc khi bốc thăm */
        .shake {
            animation: shakeAnim 0.5s ease-in-out infinite;
        }

        @keyframes shakeAnim {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-8px, 5px) rotate(-10deg); }
            40% { transform: translate(6px, -3px) rotate(10deg); }
            60% { transform: translate(-5px, 2px) rotate(-5deg); }
            80% { transform: translate(4px, -4px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .result-display {
            min-height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            line-height: 1.5;
            border: 1px dashed rgba(255,255,255,0.3);
        }

        .btn {
            background: #ffa502;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            margin-top: 15px;
        }

        .btn:hover {
            background: #ff7f50;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #747d8c;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            margin-top: 20px;
            font-size: 13px;
            color: #ced6e0;
            text-align: left;
            background: rgba(0,0,0,0.15);
            padding: 12px;
            border-radius: 8px;
        }

        .stats-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #ffa502;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bốc Thăm Hình Phạt 🎈</h1>
    
    <div class="box-container">
        <div class="lucky-box" id="luckyBox">🎁</div>
    </div>

    <button class="btn" id="drawBtn" onclick="drawCard()">BỐC THĂM KẾT QUẢ</button>
    <button class="btn" style="background:#2ed573; margin-left: 5px;" onclick="resetBox()">LÀM MỚI</button>

    <div class="result-display" id="resultDisplay">
        Hãy bấm nút để rút một thẻ ngẫu nhiên!
    </div>

    <div class="stats">
        <div class="stats-title">Số thẻ còn lại trong hộp (<span id="totalCount">14</span>):</div>
        <div id="cardsList"></div>
    </div>
</div>

<script>
    // Danh sách các thẻ ban đầu
    const originalCards = [
        { text: "🔴 Bị ném 1 quả bóng!", count: 3 },
        { text: "🔴🔴 Bị ném 2 quả bóng!", count: 2 },
        { text: "🔴🔴🔴 Bị ném 3 quả bóng! (Xui dữ thần)", count: 1 },
        { text: "🟢 Qua lượt! Bạn hoàn toàn an toàn.", count: 4 },
        { text: "🎯 Chỉ định 1 người bị ném 1 quả bóng!", count: 2 },
        { text: "🎯🎯 Chỉ định 1 người bị ném 2 quả bóng!", count: 1 },
        { text: "🎯🎯🎯 Chỉ định 1 người bị ném 3 quả bóng!", count: 1 }
    ];

    let currentCards = [];

    // Khởi tạo hộp thẻ ban đầu
    function resetBox() {
        currentCards = [];
        originalCards.forEach(item => {
            for(let i = 0; i < item.count; i++) {
                currentCards.push(item.text);
            }
        });
        document.getElementById('resultDisplay').innerHTML = "Hộp đã được làm mới! Hãy bắt đầu bốc.";
        document.getElementById('drawBtn').disabled = false;
        updateStats();
    }

    // Cập nhật bảng thống kê số thẻ còn lại hiển thị trên giao diện
    function updateStats() {
        document.getElementById('totalCount').innerText = currentCards.length;
        
        // Đếm số lượng cụ thể từng loại còn lại
        let counts = {};
        currentCards.forEach(card => {
            counts[card] = (counts[card] || 0) + 1;
        });

        let html = "";
        originalCards.forEach(item => {
            let currentCount = counts[item.text] || 0;
            html += `• ${item.text.split('!')[0]}: còn <b>${currentCount}</b> thẻ<br>`;
        });
        document.getElementById('cardsList').innerHTML = html;
    }

    // Hàm bốc thăm
    function drawCard() {
        if (currentCards.length === 0) {
            document.getElementById('resultDisplay').innerHTML = "❌ Hết thẻ rồi! Vui lòng bấm 'LÀM MỚI' để chơi tiếp.";
            document.getElementById('drawBtn').disabled = true;
            return;
        }

        const box = document.getElementById('luckyBox');
        const resultDisplay = document.getElementById('resultDisplay');
        const drawBtn = document.getElementById('drawBtn');

        // Hiệu ứng bắt đầu lắc hộp
        box.classList.add('shake');
        box.innerText = "🔄";
        resultDisplay.innerText = "Đang xáo trộn thẻ...";
        drawBtn.disabled = true;

        setTimeout(() => {
            // Ngừng lắc hộp
            box.classList.remove('shake');
            box.innerText = "🎁";
            drawBtn.disabled = false;

            // Bốc ngẫu nhiên 1 thẻ
            const randomIndex = Math.floor(Math.random() * currentCards.length);
            const pickedCard = currentCards.splice(randomIndex, 1)[0];

            // Hiển thị kết quả ra màn hình
            resultDisplay.innerHTML = `Chúc mừng bạn trúng thẻ:< <br><span style="color: #ffa502; font-size: 22px;">${pickedCard}</span>`;
            
            // Cập nhật số lượng thẻ còn lại
            updateStats();

            if(currentCards.length === 0) {
                drawBtn.disabled = true;
                resultDisplay.innerHTML += "<br><br><b style='color:#ff4757;'>[Hộp đã hết thẻ!]</b>";
            }
        }, 1000); // Lắc trong vòng 1 giây rồi ra kết quả
    }

    // Chạy lần đầu khi load trang
    resetBox();
</script>

</body>
</html>
