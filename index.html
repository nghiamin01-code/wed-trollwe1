<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tự Chọn Thẻ Bốc Thăm Hình Phạt</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #111827 0%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 26px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #f59e0b;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 25px;
        }

        /* Lưới chứa các ô vuông bốc thăm */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 450px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
        }

        /* Thiết kế hiệu ứng lật của ô vuông */
        .card-box {
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        /* Khi ô vuông được chọn (thêm class .flipped) */
        .card-box.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Mặt trước và mặt sau ô vuông */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            padding: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Mặt trước lúc chưa bốc (Ô vuông bí ẩn) */
        .card-front {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #fff;
            font-size: 28px;
            border: 2px solid #fbbf24;
        }

        .card-front:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.6);
        }

        /* Mặt sau khi đã lật (Hiện kết quả) */
        .card-back {
            background: #1f2937;
            color: #fff;
            font-size: 13px;
            transform: rotateY(180deg);
            border: 2px solid #4b5563;
            line-height: 1.3;
        }

        /* Màu sắc phân biệt kết quả sau khi lật */
        .back-safe { border-color: #10b981; background: #064e3b; }
        .back-danger { border-color: #ef4444; background: #7f1d1d; }
        .back-target { border-color: #3b82f6; background: #1e3a8a; }

        .btn-reset {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .highlight {
            color: #f59e0b;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>welcome đến với bốc thăm của trần nghĩa dz s1 vn😎😎😎</h1>
    <div class="subtitle">Hãy chọn ngẫu nhiên một ô vuông bên dưới để xem vận may của bạn!</div>
    
    <div class="card-grid" id="cardGrid"></div>

    <button class="btn-reset" onclick="initGame()">XÁO BÀI / LÀM MỚI</button>

    <div class="status-bar" id="statusBar">
        Chưa có lượt bốc nào. Hãy chọn 1 ô!
    </div>
</div>

<script>
    // Định nghĩa danh sách các loại thẻ hình phạt
    const cardTemplates = [
        { text: "🔴<br>Bị ném<br>1 quả bóng", type: "danger", count: 3 },
        { text: "🔴🔴<br>Bị ném<br>2 quả bóng", type: "danger", count: 2 },
        { text: "🔴🔴🔴<br>Bị ném<br>3 quả bóng", type: "danger", count: 1 },
        { text: "🟢<br>Qua lượt!<br>An toàn", type: "safe", count: 4 },
        { text: "🎯<br>Chỉ định 1 ng <br>ném 1 quả", type: "target", count: 2 },
        { text: "🎯🎯<br>Chỉ định 1 ng bị<br>ném 2 quả", type: "target", count: 1 },
        { text: "🎯🎯🎯<br>Chỉ định 1 ng bị<br>ném 3 quả", type: "target", count: 1 }
    ];

    let gameCards = [];

    // Khởi tạo trò chơi và trộn bài
    function initGame() {
        gameCards = [];
        
        // Gom toàn bộ thẻ dựa trên số lượng chỉ định
        cardTemplates.forEach(template => {
            for(let i = 0; i < template.count; i++) {
                gameCards.push({
                    text: template.text,
                    type: template.type,
                    isFlipped: false
                });
            }
        });

        // Thuật toán trộn bài ngẫu nhiên (Fisher-Yates)
        for (let i = gameCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [gameCards[i], gameCards[j]] = [gameCards[j], gameCards[i]];
        }

        renderGrid();
        document.getElementById('statusBar').innerHTML = `Hộp đã xếp đủ <span class="highlight">${gameCards.length} ô vuông</span>. Mời người chơi bốc!`;
    }

    // Vẽ các ô vuông ra màn hình giao diện
    function renderGrid() {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = "";

        gameCards.forEach((card, index) => {
            // Tạo thẻ bọc hiệu ứng 3D
            const cardBox = document.createElement('div');
            cardBox.className = "card-box";
            if(card.isFlipped) cardBox.classList.add('flipped');
            
            // Lắng nghe sự kiện click bốc bài
            cardBox.onclick = () => flipCard(index, cardBox);

            // Xác định class màu sắc cho mặt sau
            let backClass = "card-back";
            if(card.type === "safe") backClass += " back-safe";
            if(card.type === "danger") backClass += " back-danger";
            if(card.type === "target") backClass += " back-target";

            cardBox.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">?</div>
                    <div class="card-back ${backClass}">${card.text}</div>
                </div>
            `;
            grid.appendChild(cardBox);
        });
    }

    // Hàm xử lý lật ô vuông khi người chơi click chọn
    function flipCard(index, element) {
        // Nếu ô này đã lật rồi thì không cho lật lại nữa
        if (gameCards[index].isFlipped) return;

        // Đánh dấu ô đã lật
        gameCards[index].isFlipped = true;
        element.classList.add('flipped');

        // Lấy nội dung chữ để hiển thị lên thanh trạng thái (xóa bớt thẻ <br> đi cho đẹp)
        let cleanText = gameCards[index].text.replace(/<br>/g, " ");
        document.getElementById('statusBar').innerHTML = `Kết quả ô vừa bốc: <span class="highlight">${cleanText}</span>`;
        
        // Đếm xem còn bao nhiêu ô chưa lật
        let remaining = gameCards.filter(c => !c.isFlipped).length;
        if(remaining === 0) {
            document.getElementById('statusBar').innerHTML += " | <b style='color:#ef4444;'>Đã bốc hết tất cả các ô!</b>";
        }
    }

    // Tự động chạy khi mở web
    initGame();
</script>

</body>
</html>
