<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trường Đua Chó Chuyên Nghiệp</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f4037 0%, #99f2c8 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { 
            text-shadow: 3px 3px 6px rgba(0,0,0,0.6); 
            margin-bottom: 5px; 
            text-align: center; 
            font-size: 32px;
            letter-spacing: 2px;
        }
        p.rule { color: #f1c40f; font-style: italic; margin-bottom: 25px; text-align: center; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        /* Khung trường đua tổng thể */
        .stadium {
            background: #27ae60;
            padding: 20px 0;
            border: 8px solid #2c3e50;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 900px;
            position: relative;
            overflow: hidden;
        }

        /* Mặt đường đua giả lập cát/đất mịn chuyên dụng */
        .track-container {
            background: #e67e22; 
            background-image: radial-gradient(rgba(0,0,0,0.15) 15%, transparent 20%),
                              radial-gradient(rgba(0,0,0,0.15) 15%, transparent 20%);
            background-size: 4px 4px;
            background-position: 0 0, 2px 2px;
            padding: 10px 0;
            position: relative;
            border-top: 4px solid #fff;
            border-bottom: 4px solid #fff;
        }
        
        /* Làn đua */
        .lane {
            display: flex;
            align-items: center;
            height: 90px;
            border-bottom: 3px dashed rgba(255,255,255,0.6);
            position: relative;
        }
        .lane:last-child { border-bottom: none; }
        
        /* Tên người chơi dạng bảng điện tử */
        .player-name {
            width: 110px;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
            background: #2c3e50;
            border-right: 4px solid #f1c40f;
            padding: 8px 5px;
            text-align: center;
            z-index: 5;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }
        
        /* Vạch xuất phát */
        .start-line {
            position: absolute;
            left: 125px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #fff;
            z-index: 2;
        }

        /* Chú chó đua sinh động kèm bóng đổ */
        .dog {
            font-size: 45px;
            position: absolute;
            left: 135px; 
            transition: left 0.08s linear;
            user-select: none;
            z-index: 3;
            filter: drop-shadow(5px 10px 4px rgba(0,0,0,0.4)); 
        }
        
        /* Vạch đích chuẩn Thể thao (Caro đen trắng) */
        .finish-line {
            position: absolute;
            right: 30px;
            top: 0;
            bottom: 0;
            width: 20px;
            background-color: #fff;
            background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), 
                              linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.3);
            z-index: 2;
        }
        
        /* Khu vực nút bấm điều khiển chính */
        .control-zone { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        
        .btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: 2px solid #fff;
            padding: 16px 50px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { background: linear-gradient(135deg, #ff6b6b 0%, #e74c3c 100%); transform: translateY(-3px) scale(1.02); }
        .btn:disabled { background: #7f8c8d !important; cursor: not-allowed; box-shadow: none !important; transform: none !important; border-color: #bdc3c7; }
        
        /* Bảng hiển thị án phạt */
        #result-box {
            margin-top: 10px;
            padding: 25px;
            background: #fff;
            color: #2c3e50;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: none;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #f1c40f;
        }
        .rank-title { font-size: 18px; color: #7f8c8d; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
        .rank-item { font-size: 18px; font-weight: bold; margin: 5px 0; }
        .loser-highlight { color: #c0392b; font-size: 26px; font-weight: 800; margin: 15px 0 5px 0; text-transform: uppercase; }
        
        /* Nút để người thua tự bấm hình phạt */
        .punish-btn {
            background: linear-gradient(135deg, #f39c12 0%, #d35400 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .punish-btn:hover { transform: scale(1.05); background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%); }
        
        .punishment-highlight { 
            background: #e74c3c; 
            color: #fff; 
            font-size: 28px; 
            font-weight: 900; 
            padding: 10px 20px; 
            border-radius: 10px; 
            display: inline-block;
            margin-top: 15px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.15);
            text-transform: uppercase;
            animation: bounceIn 0.4s ease;
        }
        
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🏟️ TRƯỜNG ĐUA CHÓ QUỐC TẾ 🏟️</h1>
    <p class="rule">🏁 CHÚ CHÓ VỀ CUỐI CÙNG SẼ TỰ BẤM ĐỂ RÚT HÌNH PHẠT 🏁</p>
    
    <div class="stadium">
        <div class="track-container">
            <div class="start-line"></div>
            <div class="finish-line"></div>
            
            <div class="lane">
                <div class="player-name">Chuột</div>
                <div class="dog" id="dog-chuot">🐕</div>
            </div>
            
            <div class="lane">
                <div class="player-name">Cún</div>
                <div class="dog" id="dog-cun">🐕</div>
            </div>
            
            <div class="lane">
                <div class="player-name">Trần Nghĩa</div>
                <div class="dog" id="dog-nghia">🐕</div>
            </div>
        </div>
    </div>

    <div class="control-zone">
        <button class="btn" id="startBtn" onclick="startRace()">💥 KHỞI TRANH! 💥</button>
        
        <div id="result-box">
            <div class="rank-title">📊 Bảng Xếp Hạng Chung Cuộc</div>
            <div id="rank-list"></div>
            <hr style="border: 0; border-top: 2px dashed #bdc3c7; margin: 15px 0;">
            
            <div class="loser-highlight" id="loserName"></div>
            
            <div id="punish-action-zone">
                <p style="font-weight: bold; color: #555; margin-bottom: 5px;">Mời bạn tự ấn vào nút dưới đây để nhận án phạt:</p>
                <button class="punish-btn" id="drawPunishBtn" onclick="drawPunishment()">🎲 BẤM ĐỂ RANDOM HÌNH PHẠT 🎲</button>
            </div>
            
            <div class="punishment-highlight" id="punishment" style="display: none;"></div>
        </div>
    </div>

    <script>
        const punishments = ["Búng tai 🛑", "Đập chai vô đầu 🍾", "Búng mũi 👃"];
        let raceInterval;
        let isRacing = false;
        let currentLoser = ""; // Lưu tên người thua lượt này

        function startRace() {
            if (isRacing) return;
            isRacing = true;
            
            // Khởi tạo lại trạng thái bảng kết quả
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('punishment').style.display = 'none';
            document.getElementById('punish-action-zone').style.display = 'block';
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerText = "ĐANG ĐUA GAY CẤN... 🔥";

            const dogs = [
                { id: 'dog-chuot', name: 'Chuột', pos: 135 },
                { id: 'dog-cun', name: 'Cún', pos: 135 },
                { id: 'dog-nghia', name: 'Trần Nghĩa', pos: 135 }
            ];

            dogs.forEach(d => {
                document.getElementById(d.id).style.left = d.pos + 'px';
            });

            const trackWidth = document.querySelector('.track-container').clientWidth;
            const finishLinePos = trackWidth - 85; 

            let finishedCount = 0;
            let rank = [];

            raceInterval = setInterval(() => {
                dogs.forEach(d => {
                    if (d.pos < finishLinePos) {
                        d.pos += Math.floor(Math.random() * 14) + 2; 
                        
                        if (d.pos >= finishLinePos) {
                            d.pos = finishLinePos;
                            finishedCount++;
                            rank.push(d.name);
                        }
                        
                        document.getElementById(d.id).style.left = d.pos + 'px';
                    }
                });

                if (finishedCount === 3) {
                    clearInterval(raceInterval);
                    showResult(rank);
                }
            }, 40); 
        }

        function showResult(rank) {
            isRacing = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "💥 ĐUAVÒNG MỚI! 💥";

            currentLoser = rank[2]; // Gán người về bét

            // Hiện thứ hạng
            document.getElementById('rank-list').innerHTML = `
                <div class="rank-item" style="color: #f1c40f;">🥇 Hạng 1: ${rank[0]}</div>
                <div class="rank-item" style="color: #95a5a6;">🥈 Hạng 2: ${rank[1]}</div>
                <div class="rank-item" style="color: #e67e22;">🥉 Hạng 3: ${rank[2]}</div>
            `;

            // Báo tên người thua cuộc lên màn hình trước
            document.getElementById('loserName').innerText = `🤦‍♂️ ${currentLoser} VỀ CUỐI BÉT!`;
            document.getElementById('result-box').style.display = 'block';
        }

        // Hàm xử lý khi người thua tự bấm nút nhận phạt
        function drawPunishment() {
            const randomPunishment = punishments[Math.floor(Math.random() * punishments.length)];
            
            // Ẩn vùng bấm nút đi
            document.getElementById('punish-action-zone').style.display = 'none';
            
            // Xuất hiện hình phạt đỏ rực kịch tính
            const punishmentDiv = document.getElementById('punishment');
            punishmentDiv.innerText = randomPunishment;
            punishmentDiv.style.display = 'inline-block';
        }
    </script>
</body>
</html>
