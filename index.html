<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bốc Thăm Bóng Đập</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        h1 {
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            margin: 0 0 5px 0;
            color: #f1c40f;
            text-align: center;
            font-size: 28px;
        }
        p.subtitle {
            margin: 0 0 25px 0;
            font-size: 15px;
            color: #ddd;
            font-weight: bold;
        }
        .ticket-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 650px;
            width: 100%;
            margin-bottom: 25px;
        }
        @media (max-width: 550px) {
            .ticket-container { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
        .ticket {
            aspect-ratio: 4/3;
            perspective: 1000px;
            cursor: pointer;
        }
        .ticket-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        .ticket.flipped .ticket-inner {
            transform: rotateY(180deg);
        }
        .ticket-front, .ticket-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 2px solid #fff;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
            font-weight: bold;
        }
        .ticket-front {
            background: linear-gradient(135deg, #d35400 0%, #e67e22 100%);
            font-size: 24px;
            color: #fff;
        }
        .ticket-back {
            transform: rotateY(180deg);
            text-align: center;
            font-size: 15px;
            line-height: 1.5;
        }
        .ticket-back.safe {
            background: #2ecc71;
            color: #fff;
        }
        .ticket-back.danger {
            background: #e74c3c;
            color: #fff;
        }
        .balls {
            font-size: 24px;
            margin-top: 5px;
            display: block;
        }
        .btn {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .btn:hover { background: #8e44ad; transform: translateY(-2px); }
        
        #history-box {
            width: 100%;
            max-width: 650px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .history-title {
            font-size: 16px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 10px;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        .history-item {
            font-size: 14px;
            margin: 5px 0;
            padding: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <h1>🎯 BỐC THĂM MAY RỦI 🎯</h1>
    <p class="subtitle">Bấm vào một lá thăm bất kỳ để xem kết quả!</p>

    <div class="ticket-container" id="ticketZone"></div>

    <button class="btn" onclick="resetGame()">🔄 XÁO LẠI THĂM MỚI 🔄</button>

    <div id="history-box">
        <div class="history-title">📜 KẾT QUẢ ĐÃ BỐC:</div>
        <div id="historyList"></div>
    </div>

    <script>
        // Cấu hình nội dung hiển thị chuẩn: 1 bóng, 2 bóng, 3 bóng bằng biểu tượng ⚽
        const defaultTickets = [
            { type: 'safe', text: 'Số 1<br>(kh bị làm sao)' },
            { type: 'safe', text: 'Số 2<br>(kh bị làm sao)' },
            { type: 'safe', text: 'Số 3<br>(kh bị làm sao)' },
            { type: 'danger', text: 'chỉ định 1ng bị lém bóng<br><span class="balls">⚽</span>' },
            { type: 'danger', text: 'chỉ định 1ng bị lém bóng<br><span class="balls">⚽⚽</span>' },
            { type: 'danger', text: 'chỉ định 1ng bị lém bóng<br><span class="balls">⚽⚽⚽</span>' }
        ];

        let mixedTickets = [];
        let count = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            mixedTickets = shuffle([...defaultTickets]);
            const zone = document.getElementById('ticketZone');
            zone.innerHTML = "";

            mixedTickets.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'ticket';
                card.onclick = () => openTicket(card, index);
                card.innerHTML = `
                    <div class="ticket-inner">
                        <div class="ticket-front">Thăm ẩn</div>
                        <div class="ticket-back ${item.type}">${item.text}</div>
                    </div>
                `;
                zone.appendChild(card);
            });
        }

        function openTicket(element, index) {
            if (element.classList.contains('flipped')) return;
            element.classList.add('flipped');
            count++;

            const info = mixedTickets[index];
            // Định dạng lại chuỗi text cho phần lịch sử bên dưới nhìn gọn hơn
            const cleanLog = info.text.replace('<br>', ' ').replace('<span class="balls">', ' ').replace('</span>', '');
            const historyList = document.getElementById('historyList');
            
            historyList.innerHTML = `<div class="history-item">Lượt ${count}: ${cleanLog}</div>` + historyList.innerHTML;
        }

        function resetGame() {
            document.getElementById('historyList').innerHTML = "";
            count = 0;
            initGame();
        }

        initGame();
    </script>
</body>
</html>
