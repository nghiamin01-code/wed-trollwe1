<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siêu Đại Chiến Lật Hình - 40 Lá Bài</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { 
            text-shadow: 3px 3px 6px rgba(0,0,0,0.6); 
            margin: 0 0 5px 0; 
            text-align: center; 
            font-size: 26px;
            letter-spacing: 1px;
            color: #e74c3c;
        }
        
        /* Scoreboard */
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            width: 100%;
            max-width: 650px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .player-score {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }
        .player-score.active {
            background: #f1c40f;
            color: #0f2027;
            border-color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
        }
        .score-val { font-size: 24px; display: block; margin-top: 3px; font-weight: 900; }

        /* Lưới bài mở rộng 5x8 (40 lá bài) */
        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            max-width: 700px;
            width: 100%;
            margin-bottom: 15px;
        }
        
        /* Thẻ bài */
        .card {
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            user-select: none;
        }
        /* Mặt úp */
        .card-front {
            background: linear-gradient(135deg, #e74c3c 0%, #962d22 100%);
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        /* Mặt hình */
        .card-back {
            background-color: #f5f6fa;
            transform: rotateY(180deg);
            font-size: 24px; /* Thu nhỏ một chút để vừa vặn lưới 8 cột */
        }
        
        .card.matched {
            cursor: default;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s 0.4s, opacity 0.4s linear;
        }

        /* Nút hệ thống */
        .btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
            transition: 0.2s;
        }
        .btn:hover { background: #27ae60; transform: translateY(-2px); }
        
        /* Popup kết quả */
        #result-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            text-align: center;
            display: none;
            z-index: 10;
            max-width: 420px;
            width: 90%;
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border: 4px solid #f1c40f;
        }
        @keyframes popUp { to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        #result-box h2 { color: #111d27; margin-top: 0; font-size: 24px; }
        .winner-txt { font-size: 32px; font-weight: 900; color: #e74c3c; margin: 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        .rank-item-popup { font-size: 18px; font-weight: bold; margin: 8px 0; color: #444; }
    </style>
</head>
<body>

    <h1>🔥 ĐẠI CHIẾN LẬT HÌNH 40 LÁ 🔥</h1>
    <p style="margin: 0 0 15px 0; color: #f1c40f; font-weight: bold; text-align: center; font-size: 13px;">Đỉnh cao trí nhớ: 20 Cặp Khác Nhau. Đúng được cộng điểm và đi tiếp, sai mất lượt!</p>

    <div class="scoreboard">
        <div class="player-score active" id="score-block-0">
            👤 CÚN
            <span class="score-val" id="score-0">0</span>
        </div>
        <div class="player-score" id="score-block-1">
            👤 CHUỘT
            <span class="score-val" id="score-1">0</span>
        </div>
        <div class="player-score" id="score-block-2">
            👤 NGHĨA
            <span class="score-val" id="score-2">0</span>
        </div>
    </div>

    <div class="game-board" id="board"></div>

    <button class="btn" onclick="resetGame()">🔄 LÀM MỚI BÀN CỜ 🔄</button>

    <div id="result-box">
        <h2>🏆 TRẬN ĐẤU KẾT THÚC 🏆</h2>
        <div id="rank-summary" style="margin: 20px 0; padding: 10px; background: #f8f9fa; border-radius: 8px;"></div>
        <hr style="border: 0; border-top: 2px dashed #bdc3c7;">
        <div style="font-weight: bold; font-size: 16px; color: #7f8c8d; text-transform: uppercase; margin-top: 10px;">Nhà Vô Địch Đấu Trí:</div>
        <div class="winner-txt" id="winner-name"></div>
        <button class="btn" onclick="closeResult()">Chơi ván tiếp theo!</button>
    </div>

    <script>
        // Danh sách chính xác 20 icon hoàn toàn khác biệt nhau
        const baseIcons = [
            '🐶', '🐱', '🐭', '🦊', '🐻', '🐼', '🦁', '🐸', '🐵', '🐔',
            '🐧', '🦆', '🦖', '🐙', '🐟', '🐝', '🦄', '🍎', '⚽', '🚗'
        ];
        // Nhân đôi mảng để tạo thành 20 cặp (40 lá bài)
        const icons = [...baseIcons, ...baseIcons];
        
        let players = [
            { name: "Cún", score: 0 },
            { name: "Chuột", score: 0 },
            { name: "Nghĩa", score: 0 }
        ];
        
        let currentPlayerIndex = 0;
        let flippedCards = [];
        let lockBoard = false;
        let matchedPairs = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            const board = document.getElementById('board');
            board.innerHTML = "";
            
            // Xáo trộn 40 lá bài
            const shuffledIcons = shuffle([...icons]);

            // Tạo lưới 5x8
            shuffledIcons.forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = icon;
                card.dataset.index = index;
                card.onclick = () => flipCard(card);

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${icon}</div>
                    </div>
                `;
                board.appendChild(card);
            });

            updateScoreboardVisual();
        }

        function flipCard(card) {
            if (lockBoard) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            lockBoard = true;
            const [card1, card2] = flippedCards;

            if (card1.dataset.icon === card2.dataset.icon) {
                // ĐÚNG: Cộng điểm, giữ lượt chơi
                players[currentPlayerIndex].score += 1;
                document.getElementById(`score-${currentPlayerIndex}`).innerText = players[currentPlayerIndex].score;
                
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    flippedCards = [];
                    lockBoard = false;
                    matchedPairs++;

                    // Kết thúc khi tìm được hết 20 cặp hình
                    if (matchedPairs === icons.length / 2) {
                        endGame();
                    }
                }, 500);
            } else {
                // SAI: Úp bài xuống sau 1 giây và chuyển turn cho người kế tiếp
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    lockBoard = false;
                    
                    // Chuyển turn: Cún (0) -> Chuột (1) -> Nghĩa (2) -> Cún (0)
                    currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                    updateScoreboardVisual();
                }, 1000);
            }
        }

        function updateScoreboardVisual() {
            for (let i = 0; i < players.length; i++) {
                const block = document.getElementById(`score-block-${i}`);
                if (i === currentPlayerIndex) {
                    block.classList.add('active');
                } else {
                    block.classList.remove('active');
                }
            }
        }

        function endGame() {
            const sortedPlayers = [...players].sort((a, b) => b.score - a.score);
            
            let rankHtml = "";
            sortedPlayers.forEach((p, idx) => {
                let medal = idx === 0 ? "🥇" : (idx === 1 ? "🥈" : "🥉");
                rankHtml += `<div class="rank-item-popup">${medal} <b>${p.name}:</b> ${p.score} Điểm</div>`;
            });
            document.getElementById('rank-summary').innerHTML = rankHtml;

            const maxScore = sortedPlayers[0].score;
            const winners = players.filter(p => p.score === maxScore).map(p => p.name);
            
            document.getElementById('winner-name').innerText = winners.join(" & ");
            document.getElementById('result-box').style.display = 'block';
        }

        function resetGame() {
            players.forEach((p, i) => {
                p.score = 0;
                document.getElementById(`score-${i}`).innerText = 0;
            });
            currentPlayerIndex = 0;
            matchedPairs = 0;
            flippedCards = [];
            lockBoard = false;
            document.getElementById('result-box').style.display = 'none';
            initGame();
        }

        function closeResult() {
            document.getElementById('result-box').style.display = 'none';
            resetGame();
        }

        // Tự chạy game khi load trang
        initGame();
    </script>
</body>
</html>
