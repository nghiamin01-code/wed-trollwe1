<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Lật Hình Tính Điểm - 3 Người Chơi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 5px; text-align: center; }
        
        /* Bảng hiển thị điểm số và lượt chơi */
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            width: 100%;
            max-width: 600px;
        }
        .player-score {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .player-score.active {
            background: #f1c40f;
            color: #2c3e50;
            border-color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
        }
        .score-val { font-size: 24px; display: block; margin-top: 5px; }

        /* Lưới bài lật hình */
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
        }
        
        /* Cấu trúc thẻ bài lật mặt */
        .card {
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border-radius: 8px;
            border: 2px solid #fff;
            user-select: none;
        }
        /* Mặt úp (Mặt sau của hình) */
        .card-front {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: #fff;
            font-weight: bold;
            font-size: 24px;
        }
        /* Mặt mở (Mặt chứa hình) */
        .card-back {
            background-color: #ecf0f1;
            transform: rotateY(180deg);
        }
        .card.matched {
            cursor: default;
            visibility: hidden; /* Ẩn đi khi đã tìm đúng */
            opacity: 0;
            transition: visibility 0s 0.5s, opacity 0.5s linear;
        }

        /* Nút và bảng kết quả */
        .btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .btn:hover { background: #27ae60; transform: translateY(-2px); }
        
        #result-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            display: none;
            z-index: 10;
            max-width: 400px;
            width: 90%;
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border: 4px solid #f1c40f;
        }
        @keyframes popUp { to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        #result-box h2 { color: #2c3e50; margin-top: 0; }
        .winner-txt { font-size: 28px; font-weight: 900; color: #e74c3c; margin: 15px 0; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>🧠 ĐẤU TRÍ LẬT HÌNH 🧠</h1>
    <p style="margin: 0 0 20px 0; color: #f1c40f; font-weight: bold;">Tìm được cặp giống nhau được +1 điểm và chơi tiếp. Sai mất lượt!</p>

    <div class="scoreboard">
        <div class="player-score active" id="score-block-0">
            👤 CÚN
            <span class="score-val" id="score-0">0</span>
        </div>
        <div class="player-score" id="score-block-1">
            👤 CHUỘT
            <span class="score-val" id="score-1">0</span>
        </div>
        <div class="player-score" id="score-block-2">
            👤 NGHĨA
            <span class="score-val" id="score-2">0</span>
        </div>
    </div>

    <div class="game-board" id="board"></div>

    <button class="btn" onclick="resetGame()">🔄 CHƠI LẠI TỪ ĐẦU 🔄</button>

    <div id="result-box">
        <h2>🏆 TRẬN ĐẤU KẾT THÚC 🏆</h2>
        <div id="rank-summary" style="text-align: left; margin: 15px 0; font-size: 16px; color: #555;"></div>
        <hr style="border: 0; border-top: 1px solid #eee;">
        <div style="font-weight: bold; font-size: 16px;">NHÀ VÔ ĐỊCH:</div>
        <div class="winner-txt" id="winner-name"></div>
        <button class="btn" onclick="closeResult()">OK chơi tiếp!</button>
    </div>

    <script>
        // Danh sách các icon hình (8 cặp = 16 lá bài)
        const icons = ['🐶', '🐱', '🐭', '🦊', '🐻', '🐼', '🦁', '🐸', '🐶', '🐱', '🐭', '🦊', '🐻', '🐼', '🦁', '🐸'];
        
        let players = [
            { name: "Cún", score: 0 },
            { name: "Chuột", score: 0 },
            { name: "Nghĩa", score: 0 }
        ];
        
        let currentPlayerIndex = 0;
        let flippedCards = [];
        let lockBoard = false;
        let matchedPairs = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            const board = document.getElementById('board');
            board.innerHTML = "";
            
            // Xáo trộn bài
            const shuffledIcons = shuffle([...icons]);

            // Tạo các ô bài
            shuffledIcons.forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = icon;
                card.dataset.index = index;
                card.onclick = () => flipCard(card);

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${icon}</div>
                    </div>
                `;
                board.appendChild(card);
            });

            updateScoreboardVisual();
        }

        function flipCard(card) {
            if (lockBoard) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            // Khi lật đủ 2 lá bài
            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            lockBoard = true;
            const [card1, card2] = flippedCards;

            // So sánh 2 biểu tượng có giống nhau không
            if (card1.dataset.icon === card2.dataset.icon) {
                // ĐÚNG: Cộng điểm cho người chơi hiện tại và giữ lượt
                players[currentPlayerIndex].score += 1;
                document.getElementById(`score-${currentPlayerIndex}`).innerText = players[currentPlayerIndex].score;
                
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    flippedCards = [];
                    lockBoard = false;
                    matchedPairs++;

                    // Nếu lật hết tất cả các cặp bài (8 cặp)
                    if (matchedPairs === icons.length / 2) {
                        endGame();
                    }
                }, 600);
            } else {
                // SAI: Chuyển lượt sang người chơi tiếp theo sau 1 giây úp bài xuống
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    lockBoard = false;
                    
                    // Chuyển lượt: Cún (0) -> Chuột (1) -> Nghĩa (2) -> Cún (0)
                    currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                    updateScoreboardVisual();
                }, 1000);
            }
        }

        function updateScoreboardVisual() {
            for (let i = 0; i < players.length; i++) {
                const block = document.getElementById(`score-block-${i}`);
                if (i === currentPlayerIndex) {
                    block.classList.add('active');
                } else {
                    block.classList.remove('active');
                }
            }
        }

        function endGame() {
            // Sắp xếp thứ hạng dựa trên số điểm từ cao xuống thấp
            const sortedPlayers = [...players].sort((a, b) => b.score - a.score);
            
            // Tạo text bảng tổng sắp
            let rankHtml = "";
            sortedPlayers.forEach((p, idx) => {
                rankHtml += `<b>Hạng ${idx+1}:</b> ${p.name} - ${p.score} điểm<br>`;
            });
            document.getElementById('rank-summary').innerHTML = rankHtml;

            // Tìm người vô địch (Xử lý cả trường hợp bằng điểm nhau)
            const maxScore = sortedPlayers[0].score;
            const winners = players.filter(p => p.score === maxScore).map(p => p.name);
            
            document.getElementById('winner-name').innerText = winners.join(" & ");
            document.getElementById('result-box').style.display = 'block';
        }

        function resetGame() {
            players.forEach((p, i) => {
                p.score = 0;
                document.getElementById(`score-${i}`).innerText = 0;
            });
            currentPlayerIndex = 0;
            matchedPairs = 0;
            flippedCards = [];
            lockBoard = false;
            document.getElementById('result-box').style.display = 'none';
            initGame();
        }

        function closeResult() {
            document.getElementById('result-box').style.display = 'none';
            resetGame();
        }

        // Khởi động game lần đầu
        initGame();
    </script>
</body>
</html>
