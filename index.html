<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuộc Đua Chó Định Mệnh</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 5px; text-align: center; }
        p.rule { color: #f1c40f; font-style: italic; margin-bottom: 20px; text-align: center; font-weight: bold; }
        
        .track-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            position: relative;
            backdrop-filter: blur(5px);
        }
        
        /* Đường đua */
        .lane {
            display: flex;
            align-items: center;
            height: 80px;
            border-bottom: 2px dashed rgba(255,255,255,0.3);
            position: relative;
        }
        .lane:last-child { border-bottom: none; }
        
        /* Tên người chơi cố định bên trái */
        .player-name {
            width: 100px;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
            background: rgba(0,0,0,0.4);
            padding: 5px 10px;
            border-radius: 5px;
            text-align: center;
            z-index: 2;
        }
        
        /* Chú chó đua */
        .dog {
            font-size: 35px;
            position: absolute;
            left: 110px; /* Vị trí xuất phát */
            transition: left 0.1s linear;
            user-select: none;
        }
        
        /* Vạch đích */
        .finish-line {
            position: absolute;
            right: 20px;
            top: 0;
            bottom: 0;
            width: 10px;
            background: repeating-linear-gradient(
                45deg,
                #fff,
                #fff 5px,
                #000 5px,
                #000 10px
            );
            border-radius: 2px;
        }
        
        /* Điều khiển */
        .control-zone { margin-top: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            transition: 0.2s;
        }
        .btn:hover { background: #c0392b; transform: scale(1.05); }
        .btn:disabled { background: #7f8c8d; cursor: not-allowed; box-shadow: none; transform: none; }
        
        /* Bảng kết quả */
        #result-box {
            margin-top: 20px;
            padding: 20px;
            background: white;
            color: #333;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .loser-highlight { color: #e74c3c; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .punishment-highlight { color: #f39c12; font-size: 26px; font-weight: text-transform: uppercase; font-weight: 900; text-shadow: 1px 1px 1px rgba(0,0,0,0.1); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>🐕 CUỘC ĐUA CHÓ ĐỊNH MỆNH 🐕</h1>
    <p class="rule">⚠️ AI VỀ CUỐI CÙNG SẼ BỊ PHẠT NGẪU NHIÊN! ⚠️</p>
    
    <div class="track-container">
        <div class="finish-line"></div>
        
        <div class="lane">
            <div class="player-name">Chuột</div>
            <div class="dog" id="dog-chuot">🐕</div>
        </div>
        
        <div class="lane">
            <div class="player-name">Cún</div>
            <div class="dog" id="dog-cun">🐕</div>
        </div>
        
        <div class="lane">
            <div class="player-name">Trần Nghĩa</div>
            <div class="dog" id="dog-nghia">🐕</div>
        </div>
    </div>

    <div class="control-zone">
        <button class="btn" id="startBtn" onclick="startRace()">🏁 THẢ CHÓ ĐUA! 🏁</button>
        
        <div id="result-box">
            <div id="rank-list" style="font-weight: bold; margin-bottom: 15px; color: #555;"></div>
            <hr style="border: 0; border-top: 1px solid #eee;">
            <div class="loser-highlight" id="loserName"></div>
            <div style="font-size: 18px; margin-bottom: 5px; font-weight: bold;">Hình phạt ngẫu nhiên nhận được:</div>
            <div class="punishment-highlight" id="punishment"></div>
        </div>
    </div>

    <script>
        const punishments = ["Búng tai 🛑", "Đập chai vô đầu 🍾", "Búng mũi 👃"];
        let raceInterval;
        let isRacing = false;

        function startRace() {
            if (isRacing) return;
            isRacing = true;
            
            // Ẩn bảng kết quả cũ và khóa nút bấm
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerText = "ĐANG ĐUA... 🔥";

            // Reset vị trí 3 chú chó về vạch xuất phát (110px)
            const dogs = [
                { id: 'dog-chuot', name: 'Chuột', pos: 110 },
                { id: 'dog-cun', name: 'Cún', pos: 110 },
                { id: 'dog-nghia', name: 'Trần Nghĩa', pos: 110 }
            ];

            dogs.forEach(d => {
                document.getElementById(d.id).style.left = d.pos + 'px';
            });

            // Lấy độ rộng đường đua để tính vạch đích
            const trackWidth = document.querySelector('.track-container').clientWidth;
            const finishLinePos = trackWidth - 60; // Trừ hao kích thước chú chó

            let finishedCount = 0;
            let rank = [];

            // Chạy vòng lặp đua
            raceInterval = setInterval(() => {
                dogs.forEach(d => {
                    // Nếu chú chó này chưa về đích thì tiếp tục chạy ngẫu nhiên
                    if (d.pos < finishLinePos) {
                        d.pos += Math.floor(Math.random() * 12) + 2; // Tốc độ ngẫu nhiên từ 2 đến 13px
                        
                        // Khống chế không cho vượt quá vạch đích quá nhiều
                        if (d.pos >= finishLinePos) {
                            d.pos = finishLinePos;
                            finishedCount++;
                            rank.push(d.name); // Lưu thứ tự về đích
                        }
                        
                        document.getElementById(d.id).style.left = d.pos + 'px';
                    }
                });

                // Khi cả 3 chú chó đều đã qua vạch đích
                if (finishedCount === 3) {
                    clearInterval(raceInterval);
                    showResult(rank);
                }
            }, 50); // Cập nhật vị trí mỗi 50ms
        }

        function showResult(rank) {
            isRacing = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "🏁 ĐUAVÒNG MỚI! 🏁";

            const loser = rank[2]; // Người về thứ 3 (cuối cùng)
            
            // Random hình phạt từ mảng
            const randomPunishment = punishments[Math.floor(Math.random() * punishments.length)];

            // Hiển thị thứ hạng
            document.getElementById('rank-list').innerHTML = `
                🥇 Hạng 1: ${rank[0]} <br>
                🥈 Hạng 2: ${rank[1]} <br>
                🥉 Hạng 3: ${rank[2]}
            `;

            // Hiển thị án phạt cho người về cuối
            document.getElementById('loserName').innerText = `😭 Người về cuối: ${loser}`;
            document.getElementById('punishment').innerText = randomPunishment;
            
            // Hiện bảng kết quả lên với hiệu ứng mượt mà
            document.getElementById('result-box').style.display = 'block';
        }
    </script>
</body>
</html>
