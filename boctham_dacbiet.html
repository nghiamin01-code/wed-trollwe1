<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bốc Thăm Búng Tai - Bản Đặc Biệt</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        h1 { color: #fff; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); text-align: center; }
        p.subtitle { color: #fff; margin-bottom: 25px; opacity: 0.9; font-style: italic; text-align: center; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 25px; background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 650px; width: 90%; }
        
        .btn { background-color: #11998e; color: white; border: none; padding: 14px 28px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:hover { background-color: #0e8278; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        
        /* Khu vực hiển thị các lá thăm */
        .box-zone { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 10px; min-height: 120px; width: 100%; }
        
        /* Hiệu ứng lá thăm */
        .ticket { width: 110px; height: 110px; perspective: 1000px; cursor: pointer; }
        .ticket-inner { width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .ticket.flipped .ticket-inner { transform: rotateY(180deg); }
        
        .ticket-front, .ticket-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-weight: bold; font-size: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); border: 2px solid #fff; box-sizing: border-box; padding: 5px; }
        
        /* Mặt trước lá thăm (úp xuống) */
        .ticket-front { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #d9534f; font-size: 28px; }
        /* Mặt sau lá thăm (mở ra) */
        .ticket-back { color: white; transform: rotateY(180deg); word-break: break-word; text-align: center; }
        
        /* Hiệu ứng xáo trộn thăm */
        @keyframes shuffle {
            0% { transform: translate(0, 0); }
            25% { transform: translate(25px, -25px); }
            50% { transform: translate(-25px, 25px); }
            75% { transform: translate(-15px, -15px); }
            100% { transform: translate(0, 0); }
        }
        .shuffling { animation: shuffle 0.4s ease-in-out 3; }
        
        #result { font-size: 22px; font-weight: bold; margin-top: 15px; text-align: center; min-height: 60px; line-height: 1.5; }
    </style>
</head>
<body>

    <h1>✉️ HÒM BỐC THĂM ĐẶC BIỆT ✉️</h1>
    <p class="subtitle">Chuột - Cún - Trân Nghĩa và những chiếc thăm định mệnh</p>
    
    <div class="container">
        <!-- Nút xáo bài -->
        <button class="btn" onclick="generateTickets()">🔄 XÁO BÀI & TRỘN THĂM 🔄</button>

        <!-- Hòm bốc thăm -->
        <div class="box-zone" id="boxZone"></div>

        <!-- Kết quả -->
        <div id="result"></div>
    </div>

    <script>
        let hasChosen = false;

        // Cấu hình cứng danh sách 5 phiếu theo yêu cầu của bạn
        const originalTickets = [
            { type: 'punish', name: 'Chuột', text: '💥 Chuột dính chưởng! Chuẩn bị tinh thần bị búng tai nhé!', color: '#d9534f' },
            { type: 'punish', name: 'Cún', text: '💥 Chia buồn với Cún! Đưa tai ra chịu trận thôi nào!', color: '#d9534f' },
            { type: 'punish', name: 'Trân Nghĩa', text: '💥 Trân Nghĩa lên thớt! Không chạy đi đâu được rồi!', color: '#d9534f' },
            { type: 'safe', name: 'Không bị làm sao', text: '🍀 May mắn thoát nạn! Bạn an toàn trong lượt này.', color: '#2ecc71' },
            { type: 'power', name: 'Tùy chọn 1 người búng tai', text: '👑 QUYỀN LỰC TỐI CAO! Bạn được chỉ định bất kỳ ai để búng tai!', color: '#f1c40f' }
        ];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function generateTickets() {
            const boxZone = document.getElementById('boxZone');
            const resultDiv = document.getElementById('result');
            
            boxZone.innerHTML = "";
            resultDiv.innerText = "";
            hasChosen = false;

            // Xáo trộn ngẫu nhiên 5 phiếu
            const shuffledTickets = shuffleArray(originalTickets);

            // Tạo các lá thăm hiển thị lên màn hình
            shuffledTickets.forEach((ticketData) => {
                const ticket = document.createElement('div');
                ticket.className = 'ticket';
                ticket.onclick = () => pickTicket(ticket, ticketData);

                ticket.innerHTML = `
                    <div class="ticket-inner">
                        <div class="ticket-front">❓</div>
                        <div class="ticket-back" style="background-color: ${ticketData.color}">
                            ${ticketData.name}
                        </div>
                    </div>
                `;
                boxZone.appendChild(ticket);
            });

            // Hiệu ứng rung lắc hòm thăm
            boxZone.classList.add('shuffling');
            setTimeout(() => {
                boxZone.classList.remove('shuffling');
            }, 1200);
        }

        function pickTicket(ticketElement, ticketData) {
            // Khóa lại không cho bốc bừa bãi khi đã lật kết quả
            if (hasChosen) return;
            if (ticketElement.classList.contains('flipped')) return;

            hasChosen = true;
            ticketElement.classList.add('flipped');

            // Hiển thị kết quả tương ứng với loại phiếu
            const resultDiv = document.getElementById('result');
            let icon = "";
            if(ticketData.type === 'punish') icon = "❌ ";
            if(ticketData.type === 'safe') icon = "🎉 ";
            if(ticketData.type === 'power') icon = "⚡ ";

            resultDiv.innerHTML = `<span style="color: ${ticketData.color}">${icon}${ticketData.text}</span>`;
        }

        // Tự động chạy lần đầu tiên khi mở trang
        generateTickets();
    </script>
</body>
</html>
